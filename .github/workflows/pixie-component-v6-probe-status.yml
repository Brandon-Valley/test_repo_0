name: Pixie component V6 probe status

on:
  issue_comment:
    types: [created]

permissions:
  actions: read
  issues: write

jobs:
  status:
    if: github.event.issue.number == 5 && contains(github.event.comment.body, 'check pixie component v6 probe')
    runs-on: ubuntu-latest
    steps:
      - name: Find latest real probe run
        uses: actions/github-script@v7
        with:
          script: |
            const workflow_id = 'pixie-component-v6-probe.yml';
            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id,
              per_page: 50
            });
            let selected = null;
            for (const run of runs) {
              const jobs = await github.paginate(github.rest.actions.listJobsForWorkflowRun, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run.id,
                per_page: 100
              });
              const real = jobs.find(j => j.name === 'probe' && Array.isArray(j.steps) && j.steps.length > 0 && j.conclusion !== 'skipped');
              if (real) { selected = {run, job: real}; break; }
            }
            if (!selected) throw new Error('No non-skipped probe run found');
            const artifacts = await github.paginate(github.rest.actions.listWorkflowRunArtifacts, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: selected.run.id,
              per_page: 100
            });
            const body = [
              `PIXIE_COMPONENT_V6_PROBE_RUN_ID=${selected.run.id}`,
              `STATUS=${selected.run.status}`,
              `CONCLUSION=${selected.run.conclusion || ''}`,
              `JOB_ID=${selected.job.id}`,
              `JOB_STATUS=${selected.job.status}`,
              `JOB_CONCLUSION=${selected.job.conclusion || ''}`,
              `ARTIFACTS=${artifacts.map(a => `${a.id}:${a.name}:${a.expired}`).join(',')}`
            ].join('\n');
            await github.rest.issues.update({owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body});
            await github.rest.issues.createComment({owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body});
