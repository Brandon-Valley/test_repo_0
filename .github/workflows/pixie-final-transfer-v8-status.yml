name: Refresh final Pixie transfer v8 status

on:
  issue_comment:
    types: [created]

permissions:
  actions: read
  contents: write

jobs:
  refresh:
    if: contains(github.event.comment.body, 'refresh pixie final transfer v8')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({owner: context.repo.owner, repo: context.repo.repo, workflow_id: 'pixie-final-transfer-v8.yml', per_page: 3});
            const output = [];
            for (const run of runs.data.workflow_runs) {
              const jobs = await github.rest.actions.listJobsForWorkflowRun({owner: context.repo.owner, repo: context.repo.repo, run_id: run.id, per_page: 100});
              output.push({id: run.id, status: run.status, conclusion: run.conclusion, jobs: jobs.data.jobs.map(j => ({name:j.name,status:j.status,conclusion:j.conclusion}))});
            }
            const fs = require('fs');
            fs.mkdirSync('status',{recursive:true});
            fs.writeFileSync('status/pixie-final-transfer-v8.json',JSON.stringify(output,null,2));
      - shell: bash
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add status/pixie-final-transfer-v8.json
          git commit -m "Refresh final Pixie transfer v8 status" || true
          git pull --rebase origin master
          git push origin master
