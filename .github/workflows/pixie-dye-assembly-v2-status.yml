name: Pixie dye assembly v2 status

on:
  issue_comment:
    types: [created]

permissions:
  actions: read
  contents: write

jobs:
  status:
    if: github.event.issue.number == 6 && contains(github.event.comment.body, 'check pixie dye assembly v2')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p status
          runs=$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/pixie-dye-companion-assemble-v2.yml/runs?per_page=20")
          selected_run=''
          selected_jobs=''
          while IFS= read -r id; do
            jobs_raw=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${id}/jobs?per_page=100")
            if jq -e '.jobs[]? | select(.name == "assemble" and ((.steps | length) > 0) and .conclusion != "skipped")' >/dev/null <<<"$jobs_raw"; then
              selected_run=$(jq --argjson id "$id" '.workflow_runs[] | select(.id == $id)' <<<"$runs")
              selected_jobs=$(jq '[.jobs[] | {id,name,status,conclusion,started_at,completed_at,steps:[.steps[]? | {name,status,conclusion}]}]' <<<"$jobs_raw")
              break
            fi
          done < <(jq -r '.workflow_runs[].id' <<<"$runs")
          test -n "$selected_run"
          jq -n --argjson run "$selected_run" --argjson jobs "$selected_jobs" '{run:{id:$run.id,status:$run.status,conclusion:$run.conclusion,created_at:$run.created_at,updated_at:$run.updated_at,html_url:$run.html_url},jobs:$jobs}' > status/pixie-dye-assembly-v2-status.json
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add status/pixie-dye-assembly-v2-status.json
          git commit -m 'Update Pixie dye assembly v2 status' || exit 0
          git push
