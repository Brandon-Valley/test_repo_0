name: Capture Pixie placement build error

on:
  issue_comment:
    types: [created]

permissions:
  actions: read
  contents: write

jobs:
  capture:
    if: contains(github.event.comment.body, 'capture pixie placement error')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Capture failed run log
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p status
          gh run view 29294745736 --repo ${{ github.repository }} --log-failed > status/pixie-placement-error.txt 2>&1 || true
          tail -n 400 status/pixie-placement-error.txt > status/pixie-placement-error-tail.txt
      - name: Commit error tail
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add status/pixie-placement-error*.txt
          git commit -m 'Capture Pixie placement build error' || true
          git pull --rebase || true
          git push
