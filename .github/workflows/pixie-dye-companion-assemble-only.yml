name: Assemble Pixie dye companion only

on:
  issue_comment:
    types: [created]

permissions:
  actions: read
  contents: read
  issues: write

env:
  GRAPH_RUN_ID: '29867712473'
  ORIGINAL_LIBRARY_RUN_ID: '29708300624'
  ORIGINAL_LIBRARY_ARTIFACT: Pixie_Hollow_Houses_and_Gardens_COMPLETE_5cd7f024
  WEB_SHA: 5cd7f024ba7918f16975163e59a8320deb20dee3
  SERVER_SHA: 2a4a5fb504c4be4357781cc6215665aea38e278f

jobs:
  assemble:
    if: github.event.issue.number == 6 && contains(github.event.comment.body, 'assemble pixie dye companion only')
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - name: Checkout latest build scripts
        uses: actions/checkout@v4
        with:
          path: builder

      - name: Checkout pinned web source
        uses: actions/checkout@v4
        with:
          repository: PixieHollowRE/web
          ref: ${{ env.WEB_SHA }}
          path: web
          fetch-depth: 1
          lfs: true

      - name: Checkout pinned game server
        uses: actions/checkout@v4
        with:
          repository: PixieHollowRE/game-server
          ref: ${{ env.SERVER_SHA }}
          path: server
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download successful graph artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: pixie-dye-graphs-*
          path: downloaded_graphs
          repository: Brandon-Valley/test_repo_0
          run-id: ${{ env.GRAPH_RUN_ID }}
          github-token: ${{ github.token }}

      - name: Download successful manifest
        uses: actions/download-artifact@v4
        with:
          name: pixie-dye-companion-manifest
          path: manifest
          repository: Brandon-Valley/test_repo_0
          run-id: ${{ env.GRAPH_RUN_ID }}
          github-token: ${{ github.token }}

      - name: Download existing complete houses/gardens library
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ORIGINAL_LIBRARY_ARTIFACT }}
          path: original_library_artifact
          repository: Brandon-Valley/test_repo_0
          run-id: ${{ env.ORIGINAL_LIBRARY_RUN_ID }}
          github-token: ${{ github.token }}

      - name: Download broad source research
        uses: actions/download-artifact@v4
        with:
          name: pixie-dye-composition-research
          path: evidence/broad
          repository: Brandon-Valley/test_repo_0
          run-id: '29864509629'
          github-token: ${{ github.token }}

      - name: Download targeted dye research
        uses: actions/download-artifact@v4
        with:
          name: pixie-targeted-dye-research
          path: evidence/targeted
          repository: Brandon-Valley/test_repo_0
          run-id: '29864784989'
          github-token: ${{ github.token }}

      - name: Download dye panel evidence
        uses: actions/download-artifact@v4
        with:
          name: pixie-dye-panel-only
          path: evidence/dye_panel
          repository: Brandon-Valley/test_repo_0
          run-id: '29864923178'
          github-token: ${{ github.token }}

      - name: Download MMO core evidence
        uses: actions/download-artifact@v4
        with:
          name: pixie-mmo-core-decompile
          path: evidence/mmo_core
          repository: Brandon-Valley/test_repo_0
          run-id: '29865338060'
          github-token: ${{ github.token }}

      - name: Download framework core evidence
        uses: actions/download-artifact@v4
        with:
          name: pixie-framework-dye-core
          path: evidence/framework_core
          repository: Brandon-Valley/test_repo_0
          run-id: '29866053362'
          github-token: ${{ github.token }}

      - name: Download exact shared DyeBottle source
        uses: actions/download-artifact@v4
        with:
          name: pixie-gather-common-dye-bottle
          path: evidence/gather_common_bottle
          repository: Brandon-Valley/test_repo_0
          run-id: '29866336491'
          github-token: ${{ github.token }}

      - name: Install assembly packages
        shell: bash
        run: python -m pip install --quiet pillow

      - name: Merge graphs and discover unpacked library root
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p graphs library_unpacked
          find downloaded_graphs -type f -path '*/graphs/*.json' -print0 | while IFS= read -r -d '' f; do
            rel=${f#*/graphs/}
            mkdir -p "graphs/$(dirname "$rel")"
            cp "$f" "graphs/$rel"
          done
          graph_count=$(find graphs -type f -name '*.json' | wc -l)
          selected_count=$(($(wc -l < manifest/selected_swfs.tsv)-1))
          echo "graphs=$graph_count selected=$selected_count"
          test "$graph_count" -eq "$selected_count"

          echo 'Original artifact files:'
          find original_library_artifact -maxdepth 3 -type f -printf '%p\t%s bytes\n'
          inner_zip=$(find original_library_artifact -type f -name '*.zip' | head -n 1 || true)
          test -n "$inner_zip"
          echo "Unpacking $inner_zip"
          unzip -q "$inner_zip" -d library_unpacked
          index=$(find library_unpacked -type f -path '*/00_metadata/image_index.json' | head -n 1 || true)
          if [ -z "$index" ]; then
            echo 'No image_index.json found. Unpacked tree:' >&2
            find library_unpacked -maxdepth 4 -print >&2
            exit 1
          fi
          library_root=$(dirname "$(dirname "$index")")
          echo "$library_root" > library_root_path.txt
          echo "library_root=$library_root"
          test -f "$library_root/00_metadata/item_size_limits.json"
          python - <<'PY'
          import json, os
          from pathlib import Path
          root=Path(Path('library_root_path.txt').read_text().strip())
          candidates=list((root/'00_metadata').glob('*source*commit*.json'))
          if candidates:
              data=json.loads(candidates[0].read_text())
              text=json.dumps(data)
              assert os.environ['WEB_SHA'] in text, (candidates[0],data)
          print('library images',len(json.loads((root/'00_metadata/image_index.json').read_text())))
          PY

      - name: Prepare exact named color1 bottle mask
        shell: bash
        env:
          PYTHONPATH: builder/scripts
        run: |
          set -euo pipefail
          mkdir -p prepared_bottle
          dump=$(find evidence/gather_common_bottle -type f -path '*/swf/meadow/gather_common/swf_dump.txt' | grep -v pixiehollow | head -n 1)
          symbols=$(find evidence/gather_common_bottle -type f -path '*/swf/meadow/gather_common/export/symbolClass/symbols.csv' | grep -v pixiehollow | head -n 1)
          test -n "$dump" -a -n "$symbols"
          python builder/scripts/pixie_swf_display_graph.py --dump "$dump" --symbols "$symbols" --source-swf swf/meadow/gather_common.swf --output prepared_bottle/bottle_graph.json
          python - <<'PY'
          import json, shutil
          from pathlib import Path
          from pixie_dye_companion_build import render_target_mask

          evidence=Path('evidence/gather_common_bottle')
          graph=json.loads(Path('prepared_bottle/bottle_graph.json').read_text())
          symbol=next(row for row in graph['exported_symbols'] if row.get('class_name')=='DyeBottle')
          target=next(row for row in symbol.get('dye_targets',[]) if row.get('instance_name')=='color1')
          root_tag=int(symbol['tag_id']); child_tag=int(target['tag_id'])
          root_png=next(p for p in evidence.rglob(f'DefineSprite_{root_tag}_DyeBottle/1.png') if 'pixiehollow' not in p.as_posix())
          child_png=next(p for p in evidence.rglob(f'DefineSprite_{child_tag}*/1.png') if 'pixiehollow' not in p.as_posix())
          root_node=graph['nodes'][str(root_tag)]; child_node=graph['nodes'][str(child_tag)]
          mask=render_target_mask(
              Path('/'),
              {'canonical_path':root_png.as_posix().lstrip('/')},
              {'canonical_path':child_png.as_posix().lstrip('/')},
              root_node['bounds_twips'],child_node['bounds_twips'],target['matrix_from_root'],
          )
          assert mask is not None and mask.getbbox() is not None
          shutil.copy2(root_png,'prepared_bottle/dye_bottle_base.png')
          mask.save('prepared_bottle/dye_bottle_color1_mask.png',optimize=True)
          Path('prepared_bottle/dye_bottle_mapping.json').write_text(json.dumps({
              'source_swf':'swf/meadow/gather_common.swf','root_tag_id':root_tag,
              'color1_child_tag_id':child_tag,'matrix_from_root':target['matrix_from_root'],
              'root_bounds_twips':root_node['bounds_twips'],'child_bounds_twips':child_node['bounds_twips'],
              'mask_bbox':mask.getbbox(),
          },indent=2))
          PY

      - name: Build mappings, dye assets, documentation, and browser
        shell: bash
        env:
          PYTHONPATH: builder/scripts
        run: |
          set -euo pipefail
          library_root=$(cat library_root_path.txt)
          mkdir -p patch
          python builder/scripts/pixie_dye_companion_build.py \
            --source web --library "$library_root" --graphs graphs --output patch \
            --web-commit "$WEB_SHA" --server-commit "$SERVER_SHA" \
            --evidence evidence --exact-bottle-assets prepared_bottle
          python builder/scripts/pixie_expand_exported_symbols.py \
            --source web --library "$library_root" --graphs graphs --output patch
          mkdir -p patch/10_dye_and_composition/source_evidence/exact_dye_bottle
          cp -a prepared_bottle/. patch/10_dye_and_composition/source_evidence/exact_dye_bottle/

      - name: Validate complete companion
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path
          from PIL import Image
          root=Path('patch'); config=root/'10_dye_and_composition/config'
          summary=json.loads((root/'10_dye_and_composition/BUILD_SUMMARY.json').read_text())
          dyes=json.loads((config/'dyes.json').read_text())
          parent=json.loads((config/'image_parent_map.json').read_text())
          unmatched=json.loads((config/'unmatched_resolution.json').read_text())
          objects=json.loads((config/'object_component_map.json').read_text())
          items=json.loads((config/'item_component_map.json').read_text())
          symbols=json.loads((config/'symbol_component_map.json').read_text())
          rows=json.loads((config/'browser_rows.json').read_text())
          browser=(root/'09_browse_library.html').read_text(encoding='utf-8')
          assert len(dyes)==291
          pepper=next(x for x in dyes if x['name']=='Pepper Black')
          assert pepper['color_id']==55 and pepper['rgb']==[41,42,63] and pepper['hex']=='#292A3F'
          assert len(parent)==10924 and len(rows)==10924
          assert len(objects)>=len(items)>0 and len(symbols)>0 and len(unmatched)>0
          assert summary['bottle_report']['method']=='exact_shared_DyeBottle_symbol_named_color1_mask'
          assert summary['maximum_dye_channels_in_client']==2
          assert any(m.get('dye_slot_count',0)==2 for m in objects.values())
          assert any(m.get('dye_slot_count',0)==1 for m in objects.values())
          assert 'id="chars"' in browser and 'id="charMode"' in browser
          assert 'id="dyeSlots"' in browser and 'id="viewer"' in browser
          assert 'itemComponents[row.mapping_key]' in browser
          for dye in dyes:
              assert (root/dye['bottle_image']).is_file()
          for key,mapping in objects.items():
              for path in mapping.get('dye_slot_masks',{}).values():
                  assert (root/path).is_file(), (key,path)
          base=Image.open(root/'10_dye_and_composition/assets/dye_bottle_base.png')
          mask=Image.open(root/'10_dye_and_composition/assets/dye_bottle_color1_mask.png')
          assert base.size==mask.size and mask.getbbox() is not None
          print(json.dumps({'summary':summary,'objects':len(objects),'items':len(items),'symbols':len(symbols),'browser_bytes':(root/'09_browse_library.html').stat().st_size},indent=2))
          PY

      - name: Create and test final ZIP
        shell: bash
        run: |
          set -euo pipefail
          zip_name=Pixie_Hollow_Dye_and_Composition_Companion_5cd7f024.zip
          (cd patch && zip -q -r -6 "../$zip_name" .)
          unzip -t "$zip_name" >/dev/null
          sha256sum "$zip_name" > companion_sha256.txt
          stat -c%s "$zip_name" > companion_size.txt

      - name: Upload complete companion
        uses: actions/upload-artifact@v4
        with:
          name: Pixie_Hollow_Dye_and_Composition_Companion_5cd7f024
          path: |
            Pixie_Hollow_Dye_and_Composition_Companion_5cd7f024.zip
            companion_sha256.txt
            companion_size.txt
            patch/09_browse_library.html
            patch/10_dye_and_composition/DYE_SYSTEM.md
            patch/10_dye_and_composition/COMPOSITION_AND_DOUBLE_UNDERSCORES.md
            patch/10_dye_and_composition/UNMATCHED_EXPLAINED.md
            patch/10_dye_and_composition/README.md
            patch/10_dye_and_composition/BUILD_SUMMARY.json
          retention-days: 3
          compression-level: 0

      - name: Report completed build
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          summary=$(jq -c . patch/10_dye_and_composition/BUILD_SUMMARY.json)
          body=$(printf 'DYE_COMPANION_ASSEMBLY_RUN_ID=%s\nWEB_COMMIT=%s\nSERVER_COMMIT=%s\nARTIFACT=Pixie_Hollow_Dye_and_Composition_Companion_5cd7f024\nZIP_BYTES=%s\nZIP_SHA256=%s\nSUMMARY=%s' "$GITHUB_RUN_ID" "$WEB_SHA" "$SERVER_SHA" "$(cat companion_size.txt)" "$(cut -d' ' -f1 companion_sha256.txt)" "$summary")
          gh api "repos/${GITHUB_REPOSITORY}/issues/6/comments" -f body="$body" >/dev/null
