name: Capture Pixie bottle mask error

on:
  issue_comment:
    types: [created]

permissions:
  actions: read
  contents: write

jobs:
  capture:
    if: github.event.issue.number == 6 && contains(github.event.comment.body, 'capture pixie bottle mask error')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p status
          gh api "repos/${GITHUB_REPOSITORY}/actions/jobs/88761782954/logs" > job.log
          {
            echo '--- MATCHES ---'
            grep -n -E 'AssertionError|Traceback|StopIteration|KeyError|FileNotFound|Error:|error:|Prepare exact|DyeBottle|color1' job.log | tail -n 180 || true
            echo '--- TAIL ---'
            tail -n 350 job.log
          } > status/pixie-bottle-mask-error.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add status/pixie-bottle-mask-error.txt
          git commit -m 'Capture exact bottle mask preparation error'
          git push
