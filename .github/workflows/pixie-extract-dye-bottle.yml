name: Pixie exact dye bottle extraction

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

env:
  JAVA_TOOL_OPTIONS: -Djava.awt.headless=true -Xmx1800m

jobs:
  extract:
    if: github.event.issue.number == 6 && contains(github.event.comment.body, 'extract pixie exact dye bottle')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          repository: PixieHollowRE/web
          ref: main
          path: web
          fetch-depth: 1
          lfs: true
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Install JPEXS
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq unzip ripgrep
          mkdir -p tools/ffdec
          release=$(curl -fsSL https://api.github.com/repos/jindrapetrik/jpexs-decompiler/releases/latest)
          url=$(printf '%s' "$release" | jq -r '.assets[] | select(.name | test("ffdec_.*\\.zip$")) | .browser_download_url' | head -n 1)
          curl -fL "$url" -o tools/ffdec.zip
          unzip -q tools/ffdec.zip -d tools/ffdec
          jar=$(find tools/ffdec -type f -name ffdec.jar | head -n 1)
          echo "FFDEC_JAR=$jar" >> "$GITHUB_ENV"
      - name: Find and extract CommonGatherables1
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p result
          git -C web rev-parse HEAD > result/web_commit.txt
          grep -n 'id="DyeBottle"' web/xml/cacheableMedia.xml > result/cacheable_media_mapping.txt
          find web -type f -iname 'CommonGatherables1.swf' | sort > result/source_paths.txt
          while IFS= read -r swf; do
            rel=${swf#web/}
            safe=$(echo "${rel%.swf}" | sed -E 's#[^A-Za-z0-9._/-]+#_#g')
            out="result/$safe"
            mkdir -p "$out"
            echo "$rel" > "$out/source_path.txt"
            timeout 600s java -jar "$FFDEC_JAR" -onerror ignore -export script,symbolClass,image,shape,morphshape,button "$out/export" "$swf" > "$out/export.log" 2>&1 || true
            timeout 600s java -jar "$FFDEC_JAR" -onerror ignore -format 'sprite:png' -export sprite "$out/sprites" "$swf" > "$out/sprites.log" 2>&1 || true
            timeout 600s java -jar "$FFDEC_JAR" -onerror ignore -dumpSWF "$swf" > "$out/swf_dump.txt" 2> "$out/swf_dump.err" || true
            find "$out" -type f -size 0 -delete || true
          done < result/source_paths.txt
          rg -n 'DyeBottle|color1|color2' result > result/dye_bottle_matches.txt || true
      - uses: actions/upload-artifact@v4
        with:
          name: pixie-exact-dye-bottle
          path: result
          retention-days: 3
          compression-level: 6
      - name: Report run
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api "repos/${GITHUB_REPOSITORY}/issues/6/comments" -f body="EXACT_DYE_BOTTLE_RUN_ID=${GITHUB_RUN_ID}" >/dev/null
