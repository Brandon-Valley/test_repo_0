name: Patch Pixie houses and gardens symbol map v3

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

jobs:
  patch:
    if: github.event.issue.number == 5 && contains(github.event.comment.body, 'patch pixie hg symbols csv')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read JPEXS symbols.csv files
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          p = Path('scripts/pixie_houses_gardens_assemble.py')
          text = p.read_text()
          old = "        for csv_path in asset.rglob('symbolClass.csv'):\n            symbols.update(parse_symbol_csv(csv_path))\n"
          new = "        symbol_files = list(asset.rglob('symbolClass.csv')) + list(asset.rglob('symbols.csv'))\n        for csv_path in sorted(set(symbol_files)):\n            symbols.update(parse_symbol_csv(csv_path))\n"
          if old not in text:
              raise SystemExit('symbol map loop not found')
          p.write_text(text.replace(old, new, 1))
          PY
          python -m py_compile scripts/pixie_houses_gardens_assemble.py
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/pixie_houses_gardens_assemble.py
          git commit -m 'Read JPEXS symbols.csv maps for catalog item naming'
          git push
      - name: Confirm patch
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api "repos/${GITHUB_REPOSITORY}/issues/${{ github.event.issue.number }}/comments" -f body="HOUSES_GARDENS_SYMBOL_MAP_PATCH=complete" >/dev/null
