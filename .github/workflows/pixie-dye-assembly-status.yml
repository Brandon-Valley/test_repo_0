name: Pixie dye assembly-only status

on:
  issue_comment:
    types: [created]

permissions:
  actions: read
  contents: write

jobs:
  status:
    if: github.event.issue.number == 6 && contains(github.event.comment.body, 'check pixie dye assembly only')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p status
          runs=$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/pixie-dye-companion-assemble-only.yml/runs?per_page=20")
          run=$(jq '[.workflow_runs[] | select(.conclusion != "skipped")][0]' <<<"$runs")
          id=$(jq -r .id <<<"$run")
          jobs=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${id}/jobs?per_page=100" | jq '[.jobs[] | {id,name,status,conclusion,started_at,completed_at,steps:[.steps[]? | {name,status,conclusion}]}]')
          jq -n --argjson run "$run" --argjson jobs "$jobs" '{run:{id:$run.id,status:$run.status,conclusion:$run.conclusion,created_at:$run.created_at,updated_at:$run.updated_at,html_url:$run.html_url},jobs:$jobs}' > status/pixie-dye-assembly-status.json
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add status/pixie-dye-assembly-status.json
          git commit -m 'Update Pixie dye assembly status' || exit 0
          git push
