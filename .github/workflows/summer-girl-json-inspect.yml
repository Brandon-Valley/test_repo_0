name: Summer Girl glTF JSON Inspection

on:
  issue_comment:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  inspect:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.comment.body, 'run summer girl json inspection')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download source model
        shell: bash
        run: |
          set -euo pipefail
          rm -rf model model.zip
          mkdir -p model
          curl --fail --location --retry 5 --retry-delay 3 \
            --output model.zip \
            https://mirror.traines.eu/sketchfab-backup/61/619cfd5b08ca46589ed3ad9f6154179f.zip
          unzip -q model.zip -d model

      - name: Inspect glTF JSON
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/summer_girl/inspect_gltf.py

      - name: Upload inspection report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: summer-girl-gltf-inspection
          path: gltf_report.txt
          retention-days: 3

      - name: Report result
        if: always() && github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report = 'No report was produced.';
            if (fs.existsSync('gltf_report.txt')) {
              report = fs.readFileSync('gltf_report.txt', 'utf8');
              if (report.length > 58000) report = report.slice(0, 58000) + '\nTRUNCATED';
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `SUMMER_GIRL_JSON_RUN_ID=${context.runId}\nSUMMER_GIRL_JSON_STATUS=${{ job.status }}\n\n\`\`\`text\n${report}\n\`\`\``
            });
