          name: pixie-transfer-22
          path: chunks/pixie_extraction.tar.part-22
          if-no-files-found: ignore
          compression-level: 0
          retention-days: 3
      - uses: actions/upload-artifact@v4
        with:
          name: pixie-transfer-23
          path: chunks/pixie_extraction.tar.part-23
          if-no-files-found: ignore
          compression-level: 0
          retention-days: 3
      - uses: actions/upload-artifact@v4
        with:
          name: pixie-transfer-checksums
          path: chunks/SHA256SUMS.txt
          compression-level: 0
          retention-days: 3
      - name: Save completed transfer run ID
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p builder/status
          printf 'run_id=%s\nstatus=completed\n' "$GITHUB_RUN_ID" > builder/status/pixie-transfer-v6.txt
          cd builder
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add status/pixie-transfer-v6.txt
          git commit -m "Record completed Pixie transfer run" || true
          git push origin master
      - name: Report completion
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body: `PIXIE_TRANSFER_V6_RUN_ID=${context.runId} STATUS=${{ job.status }}`});
