name: Check Pixie v4 extraction

on:
  issue_comment:
    types: [created]

permissions:
  actions: read
  issues: write

jobs:
  check:
    if: contains(github.event.comment.body, 'check v4 extraction')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const response = await github.rest.actions.listWorkflowRuns({owner: context.repo.owner, repo: context.repo.repo, workflow_id: 'pixie-extract-v4.yml', per_page: 5});
            const lines = response.data.workflow_runs.map(run => `run=${run.id} status=${run.status} conclusion=${run.conclusion || 'none'} created=${run.created_at}`);
            await github.rest.issues.createComment({owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body: 'PIXIE_V4_STATUS\n' + lines.join('\n')});
