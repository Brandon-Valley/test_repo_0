name: Report Pixie item name catalog status

on:
  issue_comment:
    types: [created]

permissions:
  actions: read
  contents: write

jobs:
  report:
    if: contains(github.event.comment.body, 'report pixie item name catalog')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const runs=await github.rest.actions.listWorkflowRuns({owner:context.repo.owner,repo:context.repo.repo,workflow_id:'pixie-item-name-catalog.yml',per_page:5});
            const payload={generated_at:new Date().toISOString(),runs:runs.data.workflow_runs.map(r=>({id:r.id,status:r.status,conclusion:r.conclusion,created_at:r.created_at,updated_at:r.updated_at}))};
            const path='status/pixie-item-name-catalog.json';let sha;
            try{const old=await github.rest.repos.getContent({owner:context.repo.owner,repo:context.repo.repo,path});sha=old.data.sha;}catch(e){if(e.status!==404)throw e;}
            await github.rest.repos.createOrUpdateFileContents({owner:context.repo.owner,repo:context.repo.repo,path,message:'Update item catalog status',content:Buffer.from(JSON.stringify(payload,null,2)+'\n').toString('base64'),sha});
