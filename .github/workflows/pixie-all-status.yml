name: Report all Pixie workflows

on:
  issue_comment:
    types: [created]

permissions:
  actions: read
  issues: write

jobs:
  report:
    if: contains(github.event.comment.body, 'list pixie workflows')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const response = await github.rest.actions.listWorkflowRunsForRepo({owner: context.repo.owner, repo: context.repo.repo, per_page: 20});
            const lines = response.data.workflow_runs.map(r => `${r.name} run=${r.id} status=${r.status} conclusion=${r.conclusion || 'none'} path=${r.path}`);
            await github.rest.issues.createComment({owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body: 'PIXIE_WORKFLOWS\n' + lines.join('\n')});
