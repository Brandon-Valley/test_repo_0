name: Refresh final Pixie v7 status

on:
  issue_comment:
    types: [created]

permissions:
  actions: read
  contents: write

jobs:
  refresh:
    if: contains(github.event.comment.body, 'refresh final pixie v7 status')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({owner: context.repo.owner, repo: context.repo.repo, workflow_id: 'pixie-final-library-v7.yml', per_page: 5});
            const output = [];
            for (const run of runs.data.workflow_runs) {
              const jobs = await github.rest.actions.listJobsForWorkflowRun({owner: context.repo.owner, repo: context.repo.repo, run_id: run.id, per_page: 100});
              output.push({
                id: run.id,
                status: run.status,
                conclusion: run.conclusion,
                created_at: run.created_at,
                updated_at: run.updated_at,
                jobs: jobs.data.jobs.map(job => ({name: job.name, status: job.status, conclusion: job.conclusion, steps: job.steps.map(step => ({name: step.name, status: step.status, conclusion: step.conclusion}))}))
              });
            }
            const fs = require('fs');
            fs.mkdirSync('status', {recursive: true});
            fs.writeFileSync('status/pixie-final-v7-live.json', JSON.stringify(output, null, 2));
      - shell: bash
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add status/pixie-final-v7-live.json
          git commit -m "Refresh final Pixie v7 live status" || true
          git pull --rebase origin master
          git push origin master
