name: Refresh Pixie release asset status

on:
  issue_comment:
    types: [created]

permissions:
  contents: write

jobs:
  refresh:
    if: contains(github.event.comment.body, 'refresh pixie release assets')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - name: Read release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p status
          gh api \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            /repos/$GITHUB_REPOSITORY/releases/tags/pixie-image-library-final-v7 \
            --jq '{id,tag_name,created_at,published_at,assets:[.assets[]|{id,name,size,state,updated_at}],asset_count:(.assets|length),total_asset_bytes:([.assets[].size]|add // 0)}' \
            > status/pixie-release-assets.json
      - name: Commit status
        shell: bash
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add status/pixie-release-assets.json
          git commit -m "Refresh Pixie release asset status" || true
          git pull --rebase origin master
          git push origin master
