name: Put Pixie release error in issue body

on:
  issue_comment:
    types: [created]

permissions:
  actions: read
  issues: write

jobs:
  report:
    if: contains(github.event.comment.body, 'put pixie release error in issue')
    runs-on: ubuntu-latest
    steps:
      - name: Download and extract failed job log
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          curl -fL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/jobs/85782600154/logs" \
            -o raw-log
          if unzip -t raw-log >/dev/null 2>&1; then
            unzip -p raw-log > full-log
          else
            cp raw-log full-log
          fi
          tail -n 120 full-log > error-tail.txt
      - name: Put error tail in issue body
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tail = fs.readFileSync('error-tail.txt', 'utf8').slice(-55000);
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `PIXIE_RELEASE_ERROR_TAIL\n\n\`\`\`text\n${tail}\n\`\`\``
            });
